<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./includes/css/homepage.css">
    <link rel="shortcut icon" href="./resources/pics/shepherd.png">
    <title>Pursuing Immortality</title>
</head>
<body>
    <main class="page">
        <header class="site-header">
            <div>
                <p class="site-kicker">ShepherdQR.github.io</p>
                <h1 class="site-title">Pursuing Immortality</h1>
                <p class="site-subtitle">Software, algorithms, reading notes, poems, and durable thoughts.</p>
                <nav class="site-nav" aria-label="Primary">
                    <a href="https://github.com/ShepherdQR">GitHub</a>
                </nav>
            </div>
            <figure class="site-portrait">
                <img src="./resources/pics/QirongZHANG.png" alt="Qirong Zhang">
            </figure>
        </header>

        <section class="section intro-grid">
            <div>
                <h2 class="section-title">What's New</h2>
                <ul class="note-list" id="latest-notes"></ul>
            </div>
            <div>
                <h2 class="section-title">Collections</h2>
                <div class="collection-grid" id="collections"></div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Selected Notes</h2>
            <ul class="note-list" id="selected-notes"></ul>
        </section>

        <section class="section">
            <h2 class="section-title">Archive</h2>
            <ul class="archive-years" id="archive-years"></ul>
        </section>

        <section class="section">
            <h2 class="section-title">All Notes</h2>
            <ul class="all-notes" id="all-notes"></ul>
        </section>

        <footer class="footer">
            Pursuing Immortality · Since 2020
        </footer>
    </main>

    <script src="./homepage-data.js"></script>
    <script>
        (function () {
            const data = window.HOMEPAGE_DATA || { items: [], stats: { byType: {}, years: {} } };
            const items = data.items || [];

            function el(tag, className, text) {
                const node = document.createElement(tag);
                if (className) node.className = className;
                if (text !== undefined) node.textContent = text;
                return node;
            }

            function renderNote(item, compact) {
                const li = el('li', 'note-item');
                li.dataset.type = item.type;
                const date = el('time', 'note-date', item.published);
                date.dateTime = item.published;
                const main = el('div', 'note-main');
                const link = el('a', 'note-title', item.title);
                link.href = item.href;
                main.appendChild(link);
                if (!compact) {
                    const metaText = item.source === 'legacy-index'
                        ? `${item.type} · 记录 ${item.published}`
                        : `${item.type} · 创建 ${item.createdDate} · 更新 ${item.updatedDate}`;
                    main.appendChild(el('div', 'note-meta', metaText));
                }
                li.appendChild(date);
                li.appendChild(main);
                return li;
            }

            function renderLatest() {
                const list = document.getElementById('latest-notes');
                items.slice(0, 7).forEach(item => list.appendChild(renderNote(item, false)));
            }

            function renderCollections() {
                const host = document.getElementById('collections');
                const names = ['Thoughts', 'Books', 'Study', 'Videos'];
                names.forEach(name => {
                    const link = el('a', 'collection-link');
                    link.href = `#type-${name}`;
                    link.appendChild(el('span', 'collection-name', name));
                    link.appendChild(el('span', 'collection-count', `${data.stats.byType[name] || 0} notes`));
                    host.appendChild(link);
                });
            }

            function renderSelected() {
                const list = document.getElementById('selected-notes');
                const preferred = [
                    ['Books', '0122'],
                    ['Books', '0121'],
                    ['Books', '0096'],
                    ['Thoughts', '0012'],
                    ['Thoughts', '0008']
                ];
                preferred
                    .map(([type, id]) => items.find(item => item.type === type && item.id === id))
                    .filter(Boolean)
                    .forEach(item => list.appendChild(renderNote(item, false)));
            }

            function renderArchive() {
                const list = document.getElementById('archive-years');
                Object.keys(data.stats.years || {}).forEach(year => {
                    const li = el('li');
                    const link = el('a', null, `${year} (${data.stats.years[year]})`);
                    link.href = `#year-${year}`;
                    li.appendChild(link);
                    list.appendChild(li);
                });
            }

            function renderAll() {
                const list = document.getElementById('all-notes');
                let activeYear = '';
                const seenTypes = new Set();
                items.forEach(item => {
                    const year = item.published.slice(0, 4);
                    const li = el('li');
                    li.id = activeYear !== year ? `year-${year}` : '';
                    if (!seenTypes.has(item.type)) {
                        const anchor = el('span', 'anchor-target');
                        anchor.id = `type-${item.type}`;
                        li.appendChild(anchor);
                        seenTypes.add(item.type);
                    }
                    activeYear = year;
                    li.appendChild(el('span', 'all-note-date', `${item.published} · ${item.type} · 更新 ${item.updatedDate}`));
                    const link = el('a', null, item.title);
                    link.href = item.href;
                    li.appendChild(link);
                    list.appendChild(li);
                });
            }

            renderLatest();
            renderCollections();
            renderSelected();
            renderArchive();
            renderAll();
        })();
    </script>
</body>
</html>
