<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <link href="../../../includes/css/pages.css" rel="stylesheet" type="text/css">
    <link rel="alternate" type="application/atom+xml" href="../../../includes/atom.xml" title="Atom feed">
    <link rel="shortcut icon" href="../../../resources/pics/shepherd.png">
    
    <!-- 保留原有功能脚本（如果不存在可注释掉） -->
    <script src="../../../includes/js/header.js"></script>
    
    <!-- 引入 MathJax 和 Markdown 解析器 -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        li {
            font-size: 100%;
            font-weight: bold;
            background-color: lightgreen;
        }
    </style>
</head>

<body>
    <script>supportMobile();</script>
    <div class="inner">
        <!-- 标题区域，将从 markdown 的第一行自动提取 -->
        <h2 id="currentInnerTitle"></h2>
        
        <!-- 内容将会被填充到这里 -->
        <div id="markdown-content"></div>

        <hr />
        <p>
            <a href="https://shepherdqr.github.io/">Back to mainpage</a>
        </p>
    </div>

    <script>
        (async function() {
            // 获取当前 HTML 文件名，并替换后缀为 .md
            const path = window.location.pathname;
            const htmlName = path.substring(path.lastIndexOf('/') + 1);
            const mdName = htmlName.replace(/\.html?$/i, '.md') || 'index.md';

            try {
                const response = await fetch(mdName);
                if (!response.ok) throw new Error('Markdown file not found: ' + mdName);
                const mdText = await response.text();

                // 🔧 去掉开头的 HTML 注释（多行、任意内容均可处理）
                //mdText = mdText.replace(/^<!---[\s\S]*?-->\s*/, '');

                // 提取第一个 # 标题作为页面标题和 h2 内容
                const titleMatch = mdText.match(/^#\s+(.*)/m);
                const title = titleMatch ? titleMatch[1].trim() : document.title;
                document.title = title;
                document.getElementById('currentInnerTitle').textContent = title;

                // 去掉可能的标题行后渲染内容（避免重复显示标题）
                // 如果希望保留 h1 标题，也可以直接渲染全文，但页面已有 h2，所以通常去掉开头的 # 标题
                const contentMd = titleMatch ? mdText.replace(/^#\s+.*\n?/, '') : mdText;
                const htmlContent = marked.parse(contentMd);
                document.getElementById('markdown-content').innerHTML = htmlContent;

                // 通知 MathJax 重新渲染页面中的数学公式
                if (window.MathJax) {
                    await MathJax.typesetPromise();
                }
            } catch (err) {
                document.getElementById('markdown-content').innerHTML = 
                    '<p style="color:red;">内容加载失败：' + err.message + mdName +'</p>';
                console.error(err);
            }
        })();
    </script>
</body>
</html>
