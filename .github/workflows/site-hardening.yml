name: Site hardening

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile scripts
        run: python -m py_compile scripts/*.py

      - name: Check client scripts
        run: find includes/js -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Check authoring and article templates
        run: python scripts/test_templates.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Validate site
        run: python scripts/validate_site.py

      - name: Ensure generated files are committed
        run: git diff --exit-code
